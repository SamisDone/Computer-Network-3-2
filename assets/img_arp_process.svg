<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" width="700" height="340" style="font-family:Segoe UI,Arial,sans-serif;background:#fff">
  <text x="350" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a237e">ARP (Address Resolution Protocol) Process</text>
  <!-- Hosts -->
  <rect x="30" y="60" width="100" height="50" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="80" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#1565c0">Host A</text>
  <text x="80" y="98" text-anchor="middle" font-size="9" fill="#333">192.168.1.10</text>
  <rect x="300" y="60" width="100" height="50" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="350" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#2e7d32">Host B</text>
  <text x="350" y="98" text-anchor="middle" font-size="9" fill="#333">192.168.1.50</text>
  <rect x="570" y="60" width="100" height="50" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="620" y="82" text-anchor="middle" font-size="11" font-weight="bold" fill="#c62828">Host C</text>
  <text x="620" y="98" text-anchor="middle" font-size="9" fill="#333">192.168.1.80</text>
  <!-- Switch -->
  <rect x="270" y="140" width="160" height="40" rx="6" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="350" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">Switch</text>
  <!-- Lines to switch -->
  <line x1="80" y1="110" x2="300" y2="155" stroke="#90a4ae" stroke-width="2"/>
  <line x1="350" y1="110" x2="350" y2="140" stroke="#90a4ae" stroke-width="2"/>
  <line x1="620" y1="110" x2="430" y2="155" stroke="#90a4ae" stroke-width="2"/>
  <!-- Step 1: Broadcast -->
  <rect x="20" y="200" width="660" height="55" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="40" y="220" font-size="12" font-weight="bold" fill="#1565c0">Step 1 — ARP Request (Broadcast to FF:FF:FF:FF:FF:FF)</text>
  <text x="40" y="240" font-size="11" fill="#333">"Who has 192.168.1.50? Tell 192.168.1.10" → Sent to ALL hosts on the LAN</text>
  <!-- Step 2: Unicast Reply -->
  <rect x="20" y="270" width="660" height="55" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="40" y="290" font-size="12" font-weight="bold" fill="#2e7d32">Step 2 — ARP Reply (Unicast from Host B only)</text>
  <text x="40" y="310" font-size="11" fill="#333">"192.168.1.50 is at MAC AA:BB:CC:DD:EE:FF" → Sent directly back to Host A</text>
</svg>