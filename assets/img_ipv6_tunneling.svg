<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 280" width="750" height="280" style="font-family:Segoe UI,Arial,sans-serif;background:#fff">
  <text x="375" y="25" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a237e">IPv6 Tunneling Through IPv4 Network</text>
  <!-- IPv6 Island A -->
  <rect x="15" y="70" width="140" height="80" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="85" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">IPv6</text>
  <text x="85" y="118" text-anchor="middle" font-size="11" fill="#333">Network A</text>
  <text x="85" y="140" text-anchor="middle" font-size="9" fill="#666">[IPv6 Hosts]</text>
  <!-- Dual-Stack Router A -->
  <rect x="175" y="80" width="100" height="55" rx="6" fill="#fff9c4" stroke="#f57f17" stroke-width="2"/>
  <text x="225" y="103" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Dual-Stack</text>
  <text x="225" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Router A</text>
  <!-- IPv4 Cloud -->
  <ellipse cx="390" cy="105" rx="100" ry="50" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="390" y="100" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">IPv4</text>
  <text x="390" y="118" text-anchor="middle" font-size="11" fill="#c62828">Internet</text>
  <!-- Dual-Stack Router B -->
  <rect x="500" y="80" width="100" height="55" rx="6" fill="#fff9c4" stroke="#f57f17" stroke-width="2"/>
  <text x="550" y="103" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Dual-Stack</text>
  <text x="550" y="118" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Router B</text>
  <!-- IPv6 Island B -->
  <rect x="618" y="70" width="120" height="80" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="678" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2e7d32">IPv6</text>
  <text x="678" y="118" text-anchor="middle" font-size="11" fill="#333">Network B</text>
  <!-- Arrows -->
  <line x1="155" y1="105" x2="175" y2="105" stroke="#2e7d32" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="275" y1="105" x2="290" y2="105" stroke="#c62828" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="490" y1="105" x2="500" y2="105" stroke="#c62828" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="105" x2="618" y2="105" stroke="#2e7d32" stroke-width="2" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#333"/></marker></defs>
  <!-- Packet transformation -->
  <text x="225" y="160" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Encapsulate</text>
  <text x="550" y="160" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">Decapsulate</text>
  <!-- Original IPv6 packet -->
  <rect x="50" y="190" width="120" height="30" rx="4" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="110" y="210" text-anchor="middle" font-size="10" fill="#1b5e20">IPv6 Packet</text>
  <text x="20" y="210" font-size="9" fill="#666">→</text>
  <!-- Encapsulated packet -->
  <rect x="250" y="185" width="200" height="40" rx="4" fill="#ef9a9a" stroke="#c62828" stroke-width="1.5"/>
  <text x="295" y="210" text-anchor="middle" font-size="9" fill="#b71c1c">IPv4 Hdr</text>
  <rect x="330" y="190" width="110" height="30" rx="4" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="385" y="210" text-anchor="middle" font-size="9" fill="#1b5e20">IPv6 Packet</text>
  <!-- Restored packet -->
  <rect x="550" y="190" width="120" height="30" rx="4" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="610" y="210" text-anchor="middle" font-size="10" fill="#1b5e20">IPv6 Packet</text>
  <!-- Labels -->
  <text x="110" y="245" text-anchor="middle" font-size="9" fill="#666">Original</text>
  <text x="350" y="245" text-anchor="middle" font-size="9" fill="#666">Tunneled (IPv4 wraps IPv6)</text>
  <text x="610" y="245" text-anchor="middle" font-size="9" fill="#666">Restored</text>
</svg>